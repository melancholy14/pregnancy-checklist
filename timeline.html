[\"item_087\",\"item_106\"],\"seo_slug\":\"week-10\"},{\"id\":\"week_12_postpartum_center\",\"week\":12,\"title\":\"산후조리원 예약 및 지원금 확인\",\"description\":\"인기 있는 산후조리원은 초기에 마감된다. 정부 출산 지원금과 산모 교통비 지원도 함께 확인한다.\",\"type\":\"admin\",\"priority\":\"high\",\"linked_checklist_ids\":[\"item_070\",\"item_092\",\"item_103\"],\"seo_slug\":\"week-12\"},{\"id\":\"week_14_second_screening\",\"week\":14,\"title\":\"2차 기형아 검사 준비\",\"description\":\"15~20주 사이에 진행되는 쿼드검사 일정을 확인한다.\",\"type\":\"admin\",\"priority\":\"high\",\"linked_checklist_ids\":[\"item_107\"],\"seo_slug\":\"week-14\"},{\"id\":\"week_16_insurance_and_support\",\"week\":16,\"title\":\"태아보험 가입 및 산후도우미 신청\",\"description\":\"태아보험은 22주 전에 가입해야 보장 범위가 넓다. 산후도우미 바우처도 조기에 신청해야 배정받기 유리하다.\",\"type\":\"admin\",\"priority\":\"high\",\"linked_checklist_ids\":[\"item_088\",\"item_071\",\"item_102\",\"item_093\"],\"seo_slug\":\"week-16\"},{\"id\":\"week_18_babyfair\",\"week\":18,\"title\":\"베이비페어 방문 및 대형 품목 비교 시작\",\"description\":\"유모차, 카시트, 아기침대 등 대형 품목을 비교하기 좋은 시기다. 충동구매보다 비교 목적으로 방문한다.\",\"type\":\"shopping\",\"priority\":\"medium\",\"linked_checklist_ids\":[],\"seo_slug\":\"week-18\"},{\"id\":\"week_20_detailed_ultrasound\",\"week\":20,\"title\":\"정밀초음파 및 분만 병원 확정\",\"description\":\"20주 전후 정밀초음파로 태아 발육을 상세히 확인한다. 분만 병원도 이때 확정하면 여유 있다.\",\"type\":\"prep\",\"priority\":\"high\",\"linked_checklist_ids\":[\"item_108\",\"item_002\",\"item_008\"],\"seo_slug\":\"week-20\"},{\"id\":\"week_22_partner_alignment\",\"week\":22,\"title\":\"배우자 역할 분담 및 이름 후보 정리\",\"description\":\"출산 준비 담당을 미리 나누고, 아기 이름 후보도 정리하기 시작한다.\",\"type\":\"prep\",\"priority\":\"medium\",\"linked_checklist_ids\":[\"item_089\"],\"seo_slug\":\"week-22\"},{\"id\":\"week_24_gdm_and_stroller\",\"week\":24,\"title\":\"임신성 당뇨 검사 및 유모차 구매\",\"description\":\"24~28주 사이 임신성 당뇨 선별검사를 받는다. 유모차는 차량 적재, 엘리베이터 크기 등을 기준으로 비교 후 구매한다. 육아휴직 신청도 준비한다.\",\"type\":\"prep\",\"priority\":\"high\",\"linked_checklist_ids\":[\"item_109\",\"item_057\",\"item_090\",\"item_012\"],\"seo_slug\":\"week-24\"},{\"id\":\"week_26_carseat\",\"week\":26,\"title\":\"카시트 후보 좁히기\",\"description\":\"장착 난이도와 차량 호환성을 실물로 확인한다. 퇴원 시 반드시 필요하므로 미리 준비한다.\",\"type\":\"shopping\",\"priority\":\"high\",\"linked_checklist_ids\":[\"item_058\"],\"seo_slug\":\"week-26\"},{\"id\":\"week_28_tdap_and_basics\",\"week\":28,\"title\":\"백일해 접종 및 신생아 용품 준비 시작\",\"description\":\"27~36주 사이 Tdap 접종을 권장한다. 태동 모니터링도 이 시기부터 시작한다. 기본 신생아 용품(젖병, 배냇옷, 속싸개 등) 구매를 시작한다.\",\"type\":\"prep\",\"priority\":\"high\",\"linked_checklist_ids\":[\"item_110\",\"item_111\",\"item_068\",\"item_081\"],\"seo_slug\":\"week-28\"},{\"id\":\"week_30_home_prep\",\"week\":30,\"title\":\"집안 동선 정리 및 아기 침대 세팅\",\"description\":\"아기를 안고 이동하는 상황을 기준으로 집 구조를 점검한다. 아기 침대와 매트리스를 세팅하고, 세탁세제로 아기 옷을 미리 빨아둔다.\",\"type\":\"prep\",\"priority\":\"high\",\"linked_checklist_ids\":[\"item_046\",\"item_047\",\"item_065\",\"item_004\",\"item_078\",\"item_079\"],\"seo_slug\":\"week-30\"},{\"id\":\"week_32_hospital_bag_start\",\"week\":32,\"title\":\"입원 가방 준비 시작 및 신생아 용품 마무리\",\"description\":\"산모용, 아기용, 보호자용 물품을 나눠 정리한다. 젖병, 소독기, 수유쿠션, 속싸개 등 신생아 용품도 이때까지 준비를 마친다. 출산전후휴가도 신청한다.\",\"type\":\"prep\",\"priority\":\"high\",\"linked_checklist_ids\":[\"item_021\",\"item_024\",\"item_026\",\"item_035\",\"item_043\",\"item_044\",\"item_052\",\"item_053\",\"item_054\",\"item_066\",\"item_075\",\"item_083\",\"item_091\"],\"seo_slug\":\"week-32\"},{\"id\":\"week_34_labor_signs\",\"week\":34,\"title\":\"출산 징후 교육 및 병원 이동 계획 확정\",\"description\":\"이슬, 진통, 파수 등 입원 신호를 숙지한다. 병원 이동 경로, 야간 응급실 위치를 확인하고, 기저귀·분유 등 소모품도 준비한다. 회음부 마사지를 시작한다.\",\"type\":\"education\",\"priority\":\"high\",\"linked_checklist_ids\":[\"item_114\",\"item_009\",\"item_010\",\"item_007\",\"item_049\",\"item_050\",\"item_063\",\"item_099\",\"item_094\",\"item_095\",\"item_096\",\"item_101\",\"item_113\",\"item_082\",\"item_084\",\"item_085\"],\"seo_slug\":\"week-34\"},{\"id\":\"week_35_carseat_install\",\"week\":35,\"title\":\"카시트 설치 및 퇴원 준비물 완료\",\"description\":\"카시트를 차량에 설치하고, 퇴
